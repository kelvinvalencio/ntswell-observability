                    type: graphite
                    uid: ffmtg9w5jh62oc
                instant: false
                intervalMs: 1000
                maxDataPoints: 43200
                range: true
                refCount: 0
                refId: host_memory_total
                target: proxmox.nodes.lavender.memory.memtotal
            - refId: host_memory_used
              relativeTimeRange:
                from: 10800
                to: 0
              datasourceUid: ffmtg9w5jh62oc
              model:
                datasource:
                    type: graphite
                    uid: ffmtg9w5jh62oc
                instant: false
                intervalMs: 1000
                maxDataPoints: 43200
                range: true
                refCount: 0
                refId: host_memory_used
                target: proxmox.nodes.lavender.memory.memused
            - refId: memory_used_percent
              relativeTimeRange:
                from: 10800
                to: 0
              datasourceUid: __expr__
              model:
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: ($host_memory_used/$host_memory_total)*100
                intervalMs: 1000
                maxDataPoints: 43200
                refId: memory_used_percent
                type: math
                window: ""
            - refId: A
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: memory_used_percent_last
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
                type: threshold
            - refId: memory_used_percent_last
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: memory_used_percent
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: memory_used_percent_last
                settings:
                    mode: dropNN
                type: reduce
          dashboardUid: suvlbn5
          panelId: 11
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            __dashboardUid__: suvlbn5
            __panelId__: "11"
            summary: Node Memory Usage is over 80% for more than 5 minutes.
          isPaused: false
          notification_settings:
            receiver: telegram ntswell-alerts
    - orgId: 1
      name: Over 10 Seconds
      folder: Network Metrics
      interval: 10s
      rules:
        - uid: efpo4oyh8v3lse
          title: NetworkSwitchStateChangeOff
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: ffmvx2867d69sc
              model:
                datasource:
                    type: prometheus
                    uid: ffmvx2867d69sc
                editorMode: code
                expr: |-
                    sum by(instance, job, port) (
                      (tplink_port_info{state="enabled"} * 1) or (tplink_port_info{state="disabled"} * 0)
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: ffmvx2867d69sc
              model:
                datasource:
                    type: prometheus
                    uid: ffmvx2867d69sc
                editorMode: code
                expr: |-
                    sum by(instance, job, port) (
                      (tplink_port_info{state="enabled"} offset 5m * 1) or (tplink_port_info{state="disabled"} offset 5m * 0)
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: B
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: $A == 0 && $B != 0
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: math
          dashboardUid: suvlbn5
          panelId: 13
          noDataState: NoData
          execErrState: Error
          for: 10s
          annotations:
            __dashboardUid__: suvlbn5
            __panelId__: "13"
            summary: A port in the Network Switch has flipped to DISABLED over 10 seconds.
          isPaused: false
          notification_settings:
            receiver: telegram ntswell-alerts
