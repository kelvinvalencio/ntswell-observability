apiVersion: 1
groups:
    - orgId: 1
      name: Over 5 Minutes
      folder: Node Metrics
      interval: 5m
      rules:
        - uid: cfpo32wlumznka
          title: NodeCPUUsageHigh
          condition: A
          data:
            - refId: cpu_load_value
              relativeTimeRange:
                from: 10800
                to: 0
              datasourceUid: ffmtg9w5jh62oc
              model:
                datasource:
                    type: graphite
                    uid: ffmtg9w5jh62oc
                instant: false
                intervalMs: 1000
                maxDataPoints: 43200
                range: true
                refCount: 0
                refId: cpu_load_value
                target: proxmox.nodes.lavender.cpustat.avg1
            - refId: cpu_number_of_cores
              relativeTimeRange:
                from: 10800
                to: 0
              datasourceUid: ffmtg9w5jh62oc
              model:
                datasource:
                    type: graphite
                    uid: ffmtg9w5jh62oc
                instant: false
                intervalMs: 1000
                maxDataPoints: 43200
                range: true
                refCount: 0
                refId: cpu_number_of_cores
                target: proxmox.nodes.lavender.cpustat.cpus
            - refId: cpu_usage_percent
              relativeTimeRange:
                from: 10800
                to: 0
              datasourceUid: __expr__
              model:
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: ($cpu_load_value*100)/$cpu_number_of_cores
                intervalMs: 1000
                maxDataPoints: 43200
                refId: cpu_usage_percent
                type: math
                window: ""
            - refId: A
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 90
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: B
                hide: false
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
                type: threshold
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: cpu_usage_percent
                hide: false
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: mean
                refId: B
                type: reduce
          dashboardUid: suvlbn5
          panelId: 7
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            __dashboardUid__: suvlbn5
            __panelId__: "7"
            summary: Node CPU Usage is over 90% for more than 5 minutes.
          isPaused: false
          notification_settings:
            receiver: telegram ntswell-alerts
        - uid: cfpo3b8k0775sf
          title: NodeMemoryUsageHigh
          condition: A
          data:
            - refId: host_memory_total
              relativeTimeRange:
                from: 10800
                to: 0
              datasourceUid: ffmtg9w5jh62oc
